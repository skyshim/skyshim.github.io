<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자리배치표 섞기</title>

    <style>
        h1 { text-align: center; }
        p {text-align: center;}
        table { border-collapse: collapse; margin: 20px auto; }
        td { width: 100px; height: 100px; font-size: 20px; text-align: center; border: 1px solid black; cursor: pointer; }
        button { display: block; margin: 20px auto; padding: 10px 20px; font-size: 16px; }
        .fixed { background-color: aquamarine; }

        input[type="text"] {
            display: block;
            margin: 20px auto;
            padding: 8px;
            width: 300px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .seat-structure {
            text-align: center;
            margin: 20px auto;
        }

        .button-row {
            display: flex;
            width: 500px;
            justify-content: center;
            margin: 0 auto; 
        }

        .button-row button.selected {
            background-color: #cccccc;
            color: white;
            font-weight: bold;
        }

        .save-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 16px auto;
        }
        .save-row button {
            display: inline-block;
            margin: 0;
        }
    </style>
</head>
<body>
    <h1>⭐3-12 자리배치표⭐</h1>
    <p>고정할 앞자리를 클릭하여 선택하세요</p>
    <table id="seatTable"></table>
    <button onclick="shuffle()">자리 섞기</button>
    <input id="fixedPeople" type="text" placeholder="고정석 번호 지정...(띄어쓰기로 구분)" oninput="updateFix()">

    <div class="save-row">
        <button onclick="saveSeat()">저장</button>
        <button onclick="loadSeat()">최근 배치 불러오기</button>
    </div>

    <div class="seat-structure">
        <p>자리배치 구조를 선택하세요</p>
        <div class="button-row">
            <button onclick="set_structure(4)" id="btn-4" class="selected">4분단</button>
            <button onclick="set_structure(3)" id="btn-3">3분단</button>
            <button onclick="set_structure(0)" id="btn-0">7열</button>
        </div>
    </div>

</body>

<script>
    const names = [ "강윤서", "김정인", "김희서", "송시은", "신연희", "조은채", "고경태", "공유찬", "김도근", "김도윤",
                    "김동건", "김석영", "김세훈", "김원우", "김지우", "남현우", "남효우", "박수현", "배정훈", "서강건",
                    "손세윤", "송지하", "신슬우", "심성우", "여혁승", "우승민", "윤정후", "이성휘", "이재현", "이태윤",
                    "이현", "장준우", "최규혁", "한동훈", "한주원"]
    let seats = Array.from({ length: 35 }, (_, index) => index + 1);
    let seats_f = [];
    let people_f = [];

    let structure = [5,8,[2,3,4]];

    //=======================================================================//

    function set_structure(type) {
        document.querySelectorAll('.button-row button').forEach(btn => {
            btn.classList.remove('selected');
        });

        const selectedBtn = document.getElementById(`btn-${type}`);
        if (selectedBtn) selectedBtn.classList.add('selected');
        switch (type) {
            case 4: structure = [5,8,[2,3,4]]; break;
            case 3: structure = [6,6,[0,1,2,3,4]]; break;
            case 0: structure = [5,7,[0,1,2,3,4,5,6]]; break;
        }
        loadTable();
    }

    function loadTable() {
        const table = document.getElementById("seatTable");
        table.innerHTML = "";

        const row = structure[0];
        const col = structure[1];
        const last_inclusion = structure[2];

        let index = 0;

        for (let i = 0; i < row-1; i++) {
            let tr = document.createElement("tr");
            for (let j = 0; j < col; j++) {
                const td = document.createElement("td");
                td.textContent = names[seats[index]-1];
                td.id = index;
                td.addEventListener("click", toggleFix);
                if (seats_f.includes(index)) td.classList.add("fixed");
                tr.appendChild(td);
                index++;
            }
            table.appendChild(tr);
        }

        let tr = document.createElement("tr");
        for (let i = 0; i < col; i++) {
            const td = document.createElement("td");
            if (last_inclusion.includes(i)) {
                td.textContent = names[seats[index]-1];
                td.id = index;
                if (seats_f.includes(index)) td.classList.add("fixed");
                td.addEventListener("click", toggleFix);
                index++;
            } else {
                td.textContent = "";
            }
            tr.appendChild(td);
        }
        table.appendChild(tr);
    }

    function shuffle() {
        seats = seats.filter(seat => !people_f.includes(seat));
        seats = shuffleArray(seats);
        people_f = shuffleArray(people_f);

        let index = 0;
        for (let i = 0; i < 35; i++) {
            if (seats_f.includes(i)) {
                seats.splice(i, 0, people_f[index]);
                index++;
            }
        }
        loadTable();
    }

    function toggleFix(event) {
        const td = event.target;
        seats_f.push(parseInt(td.id));
        td.classList.toggle("fixed");
    }

    function updateFix() {
        people_f = document.getElementById("fixedPeople").value.split(' ');
        people_f = people_f.map(str => parseInt(str));
    }

    function saveSeat() {
        const data = {
            seats: seats,
            seats_f: seats_f,
            people_f: people_f,
            fixedInput: document.getElementById("fixedPeople").value
        };
        localStorage.setItem("seatSave", JSON.stringify(data));
        alert("저장되었습니다!");
    }

    function loadSeat() {
        const raw = localStorage.getItem("seatSave");
        if (!raw) { alert("저장된 배치가 없습니다."); return; }
        const data = JSON.parse(raw);
        seats = data.seats;
        seats_f = data.seats_f;
        people_f = data.people_f;
        document.getElementById("fixedPeople").value = data.fixedInput || "";
        loadTable();
        alert("불러오기 완료!");
    }

    loadTable();

    // =============================================

    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
</script>
</html>
